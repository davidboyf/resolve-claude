<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 280px;
      background: rgba(13, 13, 20, 0.95);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      -webkit-app-region: drag;
    }
    .logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #7c3aed, #4338ca);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 0 30px rgba(124,58,237,0.4);
    }
    h1 { font-size: 18px; font-weight: 600; color: white; }
    h1 span { color: rgba(255,255,255,0.35); font-weight: 400; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(124,58,237,0.2);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.02em;
    }
    .bar-wrap {
      width: 200px; height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #818cf8);
      border-radius: 2px;
      animation: progress 2s ease-in-out infinite;
    }
    @keyframes progress {
      0%   { width: 0%; margin-left: 0%; }
      50%  { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }
  </style>
</head>
<body>
  <div class="logo">🎬</div>
  <h1>Claude <span>× Resolve</span></h1>
  <div class="spinner"></div>
  <div class="bar-wrap"><div class="bar"></div></div>
  <span id="status">Starting up…</span>
</body>
</html>
